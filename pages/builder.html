<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛠️ Animation Builder (No-Code)</title>
  <style>
    :root {
      --bg: #15151f; --panel: #20212f; --accent: #7c6cff; --text: #e7e7f2; --muted: #9a9ab2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    header { padding: 1.25rem 1.5rem; background: var(--panel); border-bottom: 1px solid #00000033; }
    header h1 { margin: 0; font-size: 1.25rem; }
    header p { margin: .3rem 0 0; color: var(--muted); font-size: .85rem; }
    header a { color: var(--accent); }
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 1.25rem; padding: 1.25rem; align-items: start; }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: var(--panel); border: 1px solid #ffffff14; border-radius: 12px; padding: 1rem 1.1rem; }
    .panel h2 { margin: .2rem 0 .8rem; font-size: 1rem; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: .6rem; margin: .5rem 0; }
    .row label { color: var(--muted); font-size: .85rem; flex: 1; }
    input[type="number"], input[type="text"], select {
      width: 120px; padding: .35rem .5rem; border-radius: 6px; border: 1px solid #3a3c55;
      background: #1a1b28; color: var(--text); font-size: .85rem;
    }
    input[type="color"] { width: 42px; height: 30px; border: none; background: none; padding: 0; }
    fieldset { border: 1px solid #3a3c55; border-radius: 8px; margin: .8rem 0 0; padding: .5rem .7rem .7rem; }
    fieldset legend { color: var(--muted); font-size: .8rem; padding: 0 .3rem; }
    .anim-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: .5rem; margin: .35rem 0; }
    .anim-row .ctrl { justify-self: end; }
    .stage {
      aspect-ratio: 1 / 1; max-width: 520px; margin: 0 auto; border-radius: 12px; overflow: hidden;
      background-image:
        linear-gradient(45deg, #2a2a3a 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a3a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a3a 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a3a 75%);
      background-size: 24px 24px; background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }
    .stage svg { width: 100%; height: 100%; display: block; }
    .actions { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1rem; }
    button {
      background: var(--accent); color: #fff; border: none; padding: .5rem .9rem; border-radius: 6px; cursor: pointer; font-size: .85rem;
    }
    button.secondary { background: #33344a; }
    textarea {
      width: 100%; min-height: 190px; margin-top: .8rem; background: #12131d; color: #d6d6ea;
      border: 1px solid #3a3c55; border-radius: 8px; padding: .7rem; font-family: ui-monospace, monospace; font-size: .8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🛠️ Animation Builder <span style="color:var(--muted);font-weight:400;font-size:.8em">(No-Code)</span></h1>
    <p>Einfache SVG-Animationen ganz ohne Code zusammenklicken. ·
       <a href="./">Galerie</a> · <a href="preview/">Viewer</a></p>
  </header>

  <div class="layout">
    <!-- Steuerung -->
    <div class="panel">
      <h2>Form</h2>
      <div class="row"><label for="shapeType">Typ</label>
        <select id="shapeType"><option value="circle">Kreis</option><option value="rect">Rechteck</option></select>
      </div>
      <div class="row"><label for="size">Größe (Radius / B×H)</label><input type="number" id="size" value="30" min="1" /></div>
      <div class="row" id="rowSizeH" style="display:none"><label for="sizeH">Höhe (Rechteck)</label><input type="number" id="sizeH" value="60" min="1" /></div>
      <div class="row"><label for="color">Farbe</label><input type="color" id="color" value="#3498db" /></div>
      <div class="row"><label for="posX">Position X</label><input type="number" id="posX" value="100" /></div>
      <div class="row"><label for="posY">Position Y</label><input type="number" id="posY" value="100" /></div>

      <h2 style="margin-top:1rem">Szene</h2>
      <div class="row"><label for="width">Breite</label><input type="number" id="width" value="200" min="1" /></div>
      <div class="row"><label for="height">Höhe</label><input type="number" id="height" value="200" min="1" /></div>
      <div class="row"><label for="duration">Dauer (s)</label><input type="number" id="duration" value="2" min="0.1" step="0.1" /></div>
      <div class="row"><label for="loop">Endlosschleife</label><input type="checkbox" id="loop" checked /></div>
      <div class="row"><label for="bgOn">Hintergrund</label><input type="checkbox" id="bgOn" /></div>
      <div class="row"><label for="bg">Hintergrundfarbe</label><input type="color" id="bg" value="#0f0f1e" /></div>

      <fieldset>
        <legend>Animationen</legend>
        <div class="anim-row">
          <input type="checkbox" id="a_move" /><label for="a_move">Bewegen nach (X, Y)</label>
          <span class="ctrl"><input type="number" id="move_x" value="170" style="width:56px" /> <input type="number" id="move_y" value="100" style="width:56px" /></span>
        </div>
        <div class="anim-row">
          <input type="checkbox" id="a_rotate" /><label for="a_rotate">Drehen um (Grad)</label>
          <span class="ctrl"><input type="number" id="rotate_by" value="360" style="width:80px" /></span>
        </div>
        <div class="anim-row">
          <input type="checkbox" id="a_scale" /><label for="a_scale">Skalieren auf (Faktor)</label>
          <span class="ctrl"><input type="number" id="scale_to" value="1.6" step="0.1" style="width:80px" /></span>
        </div>
        <div class="anim-row">
          <input type="checkbox" id="a_color" /><label for="a_color">Farbe wechseln zu</label>
          <span class="ctrl"><input type="color" id="color_to" value="#e74c3c" /></span>
        </div>
        <div class="anim-row">
          <input type="checkbox" id="a_fade" /><label for="a_fade">Ausblenden auf (Deckkraft)</label>
          <span class="ctrl"><input type="number" id="fade_to" value="0" min="0" max="1" step="0.1" style="width:80px" /></span>
        </div>
      </fieldset>
    </div>

    <!-- Vorschau + Ausgabe -->
    <div class="panel">
      <h2>Vorschau</h2>
      <div class="stage" id="stage"></div>
      <div class="actions">
        <button id="download">⬇️ SVG herunterladen</button>
        <button id="copySvg" class="secondary">📋 SVG kopieren</button>
        <button id="copyYaml" class="secondary">📋 YAML-Spec kopieren</button>
      </div>
      <h2 style="margin-top:1rem">YAML-Spec (für die Pipeline)</h2>
      <textarea id="yaml" readonly></textarea>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const num = (x) => String(Number(x));

    function animate(attr, a, b, dur, loop) {
      return loop
        ? `<animate attributeName="${attr}" values="${a};${b};${a}" dur="${dur}" repeatCount="indefinite"/>`
        : `<animate attributeName="${attr}" from="${a}" to="${b}" dur="${dur}" fill="freeze" repeatCount="1"/>`;
    }
    function animateTransform(type, a, b, dur, loop) {
      const c = `attributeName="transform" attributeType="XML" type="${type}" additive="sum" dur="${dur}"`;
      return loop
        ? `<animateTransform ${c} values="${a};${b};${a}" repeatCount="indefinite"/>`
        : `<animateTransform ${c} from="${a}" to="${b}" fill="freeze" repeatCount="1"/>`;
    }

    // Erzeugt SVG analog zu scripts/templates.py
    function buildSvg(s) {
      const W = s.width, H = s.height, dur = `${num(s.duration)}s`, loop = s.loop;
      const cx = s.shape.position[0], cy = s.shape.position[1], color = s.shape.color;
      const a = s.animations;

      let inner = "";
      if (a.color) inner += animate("fill", color, a.color.to, dur, loop);
      if (a.fade) inner += animate("opacity", "1", num(a.fade.to), dur, loop);

      let shapeEl;
      if (s.shape.type === "circle") {
        shapeEl = `<circle cx="0" cy="0" r="${num(s.shape.size)}" fill="${color}">${inner}</circle>`;
      } else {
        const w = s.shape.size, h = s.shape.h;
        shapeEl = `<rect x="${num(-w / 2)}" y="${num(-h / 2)}" width="${num(w)}" height="${num(h)}" fill="${color}">${inner}</rect>`;
      }

      let innerT = "";
      if (a.rotate) innerT += animateTransform("rotate", "0 0 0", `${num(a.rotate.by)} 0 0`, dur, loop);
      if (a.scale) innerT += animateTransform("scale", "1", num(a.scale.to), dur, loop);
      const innerGroup = `<g>${innerT}${shapeEl}</g>`;

      let outerAnim = "";
      if (a.move) {
        const dx = a.move.to[0] - cx, dy = a.move.to[1] - cy;
        outerAnim = animateTransform("translate", "0 0", `${num(dx)} ${num(dy)}`, dur, loop);
      }
      const outerGroup = `<g transform="translate(${num(cx)},${num(cy)})">${outerAnim}${innerGroup}</g>`;
      const bg = s.background ? `<rect width="${num(W)}" height="${num(H)}" fill="${s.background}"/>` : "";

      return `<svg width="${num(W)}" height="${num(H)}" viewBox="0 0 ${num(W)} ${num(H)}" xmlns="http://www.w3.org/2000/svg">\n  ${bg}\n  ${outerGroup}\n</svg>\n`;
    }

    function buildYaml(s) {
      const lines = ["format: svg", `width: ${s.width}`, `height: ${s.height}`, `duration: ${s.duration}`, `loop: ${s.loop}`];
      if (s.background) lines.push(`background: "${s.background}"`);
      const sizeStr = s.shape.type === "rect" ? `[${s.shape.size}, ${s.shape.h}]` : `${s.shape.size}`;
      lines.push("shape:");
      lines.push(`  type: ${s.shape.type}`);
      lines.push(`  size: ${sizeStr}`);
      lines.push(`  color: "${s.shape.color}"`);
      lines.push(`  position: [${s.shape.position[0]}, ${s.shape.position[1]}]`);
      lines.push("animations:");
      const a = s.animations;
      if (a.move) lines.push(`  - { type: move, to: [${a.move.to[0]}, ${a.move.to[1]}] }`);
      if (a.rotate) lines.push(`  - { type: rotate, by: ${a.rotate.by} }`);
      if (a.scale) lines.push(`  - { type: scale, to: ${a.scale.to} }`);
      if (a.color) lines.push(`  - { type: color, to: "${a.color.to}" }`);
      if (a.fade) lines.push(`  - { type: fade, to: ${a.fade.to} }`);
      return lines.join("\n") + "\n";
    }

    function readSpec() {
      const type = $("shapeType").value;
      const animations = {};
      if ($("a_move").checked) animations.move = { to: [Number($("move_x").value), Number($("move_y").value)] };
      if ($("a_rotate").checked) animations.rotate = { by: Number($("rotate_by").value) };
      if ($("a_scale").checked) animations.scale = { to: Number($("scale_to").value) };
      if ($("a_color").checked) animations.color = { to: $("color_to").value };
      if ($("a_fade").checked) animations.fade = { to: Number($("fade_to").value) };
      return {
        width: Number($("width").value),
        height: Number($("height").value),
        duration: Number($("duration").value),
        loop: $("loop").checked,
        background: $("bgOn").checked ? $("bg").value : null,
        shape: {
          type,
          size: Number($("size").value),
          h: Number($("sizeH").value),
          color: $("color").value,
          position: [Number($("posX").value), Number($("posY").value)],
        },
        animations,
      };
    }

    let currentSvg = "";
    function render() {
      $("rowSizeH").style.display = $("shapeType").value === "rect" ? "" : "none";
      const spec = readSpec();
      currentSvg = buildSvg(spec);
      $("stage").innerHTML = currentSvg;
      $("yaml").value = buildYaml(spec);
    }

    function download(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll("input, select").forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });
    $("download").addEventListener("click", () => download("animation.svg", currentSvg, "image/svg+xml"));
    $("copySvg").addEventListener("click", () => navigator.clipboard.writeText(currentSvg));
    $("copyYaml").addEventListener("click", () => navigator.clipboard.writeText($("yaml").value));

    render();
  </script>
</body>
</html>
