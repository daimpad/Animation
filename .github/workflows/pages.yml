name: Deploy GitHub Pages

# Veröffentlicht die Galerie + den interaktiven Viewer auf GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für das Pages-Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiges Deployment, laufende werden abgebrochen
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Site zusammenstellen
        run: |
          mkdir -p _site/preview
          cp pages/index.html _site/index.html          # Galerie/Landing-Seite
          cp pages/builder.html _site/builder.html       # No-Code-Builder
          cp preview/index.html _site/preview/index.html # Interaktiver Viewer
          cp -r outputs _site/outputs                    # Beispiel-Animationen

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
        with:
          # Aktiviert GitHub Pages automatisch (Build-Typ "GitHub Actions"),
          # falls es im Repo noch nicht eingerichtet ist – kein manueller Schritt nötig.
          enablement: true

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
